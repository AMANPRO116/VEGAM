<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Vegam | FKDC Kart</title>

<style>
:root { --accent:#00ffcc; --bg:#0b0b0b; }

* { box-sizing:border-box; }
html,body { margin:0; padding:0; background:black; color:white; font-family:Arial,sans-serif; overflow-x:hidden; }

/* ===== VIDEO ===== */
#videoWrap { position:fixed; inset:0; z-index:1; overflow:hidden; }
#video {
  width:100%; height:100%; object-fit:cover;
  transition: filter 1.5s, opacity 1.5s, transform 1.5s;
}
#vignette {
  position:absolute; inset:0;
  background: radial-gradient(transparent 60%, rgba(0,0,0,0.85));
}

/* ===== START BUTTON ===== */
#startBtn {
  position:absolute; inset:0; display:grid; place-items:center;
  background:rgba(0,0,0,0.5); backdrop-filter:blur(8px);
  z-index:5; transition:0.5s;
}
#startBtn button {
  padding:16px 28px; font-size:18px;
  border:2px solid var(--accent); background:none; color:white;
  cursor:pointer; letter-spacing:2px;
}
#startBtn button:hover { background:var(--accent); color:black; }

/* ===== TITLE ===== */
#title {
  position:absolute; top:45%; width:100%; text-align:center;
  font-size:64px; letter-spacing:8px;
  opacity:0; transform:translateY(20px);
  transition:1s; z-index:4;
}
#title.show { opacity:1; transform:translateY(0); }

/* ===== NAVBAR ===== */
#navbar {
  position:fixed; top:0; width:100%;
  display:flex; justify-content:center; gap:40px;
  padding:15px; background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  opacity:0; transition:1s; z-index:6;
}
#navbar.show { opacity:1; }
#navbar a {
  color:white; text-decoration:none;
  font-size:16px; letter-spacing:1px;
}
#navbar a:hover { color:var(--accent); }

/* ===== SECTIONS ===== */
section {
  min-height:100vh;
  padding:100px 20px;
  background:var(--bg);
  border-top:1px solid #222;
}
h1 { text-align:center; margin-bottom:20px; }
.container { max-width:900px; margin:auto; text-align:center; }

/* cards */
.card-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px; margin-top:30px;
}
.card {
  background:#111; padding:20px;
  border:1px solid #222;
  transition:0.3s;
}
.card:hover {
  transform:translateY(-5px);
  border-color:var(--accent);
}
</style>

</head>

<body>

<!-- START -->

<div id="startBtn"><button>ENTER EXPERIENCE</button></div>

<!-- VIDEO -->

<div id="videoWrap">
  <video id="video" playsinline preload="auto">
    <source src="intro.mp4" type="video/mp4">
  </video>
  <div id="vignette"></div>
</div>

<!-- AUDIO -->

<audio id="audio" src="intro.mp3"></audio>

<!-- TITLE -->

<div id="title">TEAM VEGAM</div>

<!-- NAVBAR -->

<div id="navbar">
  <a href="#home">Home</a>
  <a href="#about">About</a>
  <a href="#team">Team</a>
  <a href="#contact">Contact</a>
</div>

<!-- SECTIONS -->

<section id="home">
  <h1>HOME</h1>
  <div class="container">
    FKDC Kart Project by Team Vegam.
  </div>
</section>

<section id="about">
  <h1>ABOUT</h1>
  <div class="container">
    This kart is designed for performance, safety, and innovation.
  </div>
</section>

<section id="team">
  <h1>TEAM</h1>
  <div class="container">
    <div class="card-grid">
      <div class="card">Aman</div>
      <div class="card">Rochan</div>
      <div class="card">Varshith</div>
    </div>
  </div>
</section>

<section id="contact">
  <h1>CONTACT</h1>
  <div class="container">
    Email: teamvegam@email.com
  </div>
</section>

<script>
const video = document.getElementById("video");
const audio = document.getElementById("audio");
const startBtn = document.getElementById("startBtn");
const title = document.getElementById("title");
const navbar = document.getElementById("navbar");

/* START */
startBtn.onclick = () => {
  startBtn.style.display="none";
  video.play();
  audio.play().catch(()=>{});
};

/* TITLE */
setTimeout(()=> title.classList.add("show"), 1000);

/* TRANSITION */
video.onended = () => {
  video.style.filter="blur(25px)";
  video.style.transform="scale(1.2)";
  video.style.opacity="0";

  title.style.opacity="0";

  setTimeout(()=> {
    navbar.classList.add("show");
    document.body.style.overflowY="auto";
  }, 1200);
};

/* fallback */
setTimeout(()=> video.onended(), 4500);

/* smooth scroll */
document.querySelectorAll('a[href^="#"]').forEach(a=>{
  a.onclick = e=>{
    e.preventDefault();
    document.querySelector(a.getAttribute('href'))
      .scrollIntoView({behavior:'smooth'});
  };
});
</script>

</body>
</html>
