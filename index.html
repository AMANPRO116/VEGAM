<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Vegam | FKDC Kart</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* Fade overlay */
#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  transition: opacity 1.5s;
  z-index: 5;
}

/* TEAM VEGAM text */
#text {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  font-size: 60px;
  letter-spacing: 5px;
  opacity: 0;
  transition: opacity 2s;
  z-index: 10;
}

/* Menu */
#menu {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  opacity: 0;
  filter: blur(12px);
  transition: all 2s;
  z-index: 10;
}

#menu a {
  display: block;
  margin: 12px;
  font-size: 28px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

#menu a:hover {
  color: #00ffcc;
  transform: scale(1.1);
}

.show {
  opacity: 1 !important;
  filter: blur(0px) !important;
}
</style>
</head>

<body>

<div id="overlay"></div>
<div id="text">TEAM VEGAM</div>

<div id="menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Meet the Team</a>
  <a href="#">Contact Us</a>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.152/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.152/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();

/* Camera */
const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 2, 6);

/* Renderer */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Lighting */
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 10, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

/* Kart */
let kart;
let finished = false;

/* Load model */
const loader = new GLTFLoader();
loader.load('kart.glb', function(gltf) {
  kart = gltf.scene;

  kart.position.set(-8, 0, 0);
  kart.scale.set(1.2, 1.2, 1.2);

  scene.add(kart);
  animate();
});

/* Animation loop */
function animate() {
  requestAnimationFrame(animate);

  if (kart && !finished) {

    // Move kart
    kart.position.x += 0.08;

    // Camera follows kart
    camera.position.x += (kart.position.x - camera.position.x) * 0.05;

    // Exit condition
    if (kart.position.x > 6) {
      finished = true;

      // Fade to black
      document.getElementById("overlay").style.opacity = 1;

      setTimeout(() => {
        document.getElementById("text").style.opacity = 1;

        setTimeout(() => {
          document.getElementById("menu").classList.add("show");
        }, 2000);

      }, 1500);
    }
  }

  renderer.render(scene, camera);
}

/* Resize fix */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
