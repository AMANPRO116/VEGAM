<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Vegam | FKDC Kart</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
  overflow: hidden;
}

/* Intro screen */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 60px;
  letter-spacing: 6px;
  animation: fadeOut 3s ease forwards;
  animation-delay: 2s;
}

/* Menu */
#menu {
  position: absolute;
  width: 100%;
  top: 40%;
  text-align: center;
  opacity: 0;
  transform: translateY(20px);
  animation: showMenu 2s ease forwards;
  animation-delay: 4s;
}

#menu a {
  display: block;
  margin: 12px;
  font-size: 28px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

#menu a:hover {
  color: #00ffcc;
  transform: scale(1.1);
}

/* Animations */
@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(1.2);
  }
}

@keyframes showMenu {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div id="intro">TEAM VEGAM</div>

<div id="menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Meet the Team</a>
  <a href="#">Contact Us</a>
</div>

</body>
</html>
