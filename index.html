<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Vegam | FKDC Kart</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
}

#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  transition: opacity 1.5s;
  z-index: 5;
}

#text {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  font-size: 60px;
  letter-spacing: 5px;
  opacity: 0;
  transition: opacity 2s;
  z-index: 10;
}

#menu {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  opacity: 0;
  filter: blur(12px);
  transition: all 2s;
  z-index: 10;
}

#menu a {
  display: block;
  margin: 10px;
  font-size: 28px;
  color: white;
  text-decoration: none;
}

.show {
  opacity: 1 !important;
  filter: blur(0px) !important;
}
</style>

</head>

<body>

<div id="overlay"></div>
<div id="text">TEAM VEGAM</div>

<div id="menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Meet the Team</a>
  <a href="#">Contact</a>
</div>

<script type="module">
import * as THREE from 'https://unpkg.com/three@0.152/build/three.module.js';
import { GLTFLoader } from 'https://unpkg.com/three@0.152/examples/jsm/loaders/GLTFLoader.js';

const scene = new THREE.Scene();

/* Camera */
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);

/* Renderer */
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* Lights */
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5, 10, 5);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

/* Ground */
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({ color: 0x111111 })
);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -1;
scene.add(ground);

/* Variables */
let kart;
let finished = false;

/* Loader */
const loader = new GLTFLoader();

loader.load(
  './kart.glb',
  function(gltf) {

    console.log("MODEL LOADED");

    kart = gltf.scene;

    // 🔥 Fix materials & visibility
    kart.traverse((child) => {
      if (child.isMesh) {
        child.material.side = THREE.DoubleSide;
        child.material.needsUpdate = true;
      }
    });

    // 🔥 Adjust position + scale
    kart.position.set(-8, -1, 0);
    kart.scale.set(1,1,1);

    scene.add(kart);
    animate();
  },
  undefined,
  function(error) {
    console.error("MODEL ERROR:", error);

    // 🔥 fallback (always visible)
    const cube = new THREE.Mesh(
      new THREE.BoxGeometry(),
      new THREE.MeshStandardMaterial({ color: 0x00ff00 })
    );
    scene.add(cube);

    function fallback() {
      requestAnimationFrame(fallback);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }
    fallback();
  }
);

/* Animation */
function animate() {
  requestAnimationFrame(animate);

  if (kart && !finished) {
    kart.position.x += 0.08;
    camera.position.x += (kart.position.x - camera.position.x) * 0.05;

    if (kart.position.x > 6) {
      finished = true;

      document.getElementById("overlay").style.opacity = 1;

      setTimeout(() => {
        document.getElementById("text").style.opacity = 1;

        setTimeout(() => {
          document.getElementById("menu").classList.add("show");
        }, 2000);
      }, 1500);
    }
  }

  renderer.render(scene, camera);
}

/* Resize */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
