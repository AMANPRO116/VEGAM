<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team Vegam | FKDC Kart</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

/* Video */
#video {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: filter 1.5s, opacity 1.5s;
}

/* Menu */
#menu {
  position: absolute;
  top: 40%;
  width: 100%;
  text-align: center;
  opacity: 0;
  filter: blur(10px);
  transition: all 2s;
}

#menu a {
  display: block;
  margin: 12px;
  font-size: 28px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

#menu a:hover {
  color: #00ffcc;
  transform: scale(1.1);
}

.show {
  opacity: 1;
  filter: blur(0px);
}
</style>

</head>

<body>

<!-- VIDEO -->

<video id="video" autoplay muted playsinline>
  <source src="intro.mp4" type="video/mp4">
</video>

<!-- MENU -->

<div id="menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Meet the Team</a>
  <a href="#">Contact Us</a>
</div>

<script>
const video = document.getElementById("video");
const menu = document.getElementById("menu");

/* When video ends */
video.onended = () => {

  // Blur + fade video
  video.style.filter = "blur(20px)";
  video.style.opacity = "0";

  // Show menu
  setTimeout(() => {
    menu.classList.add("show");
  }, 1000);
};

/* Fallback (if autoplay timing needed) */
setTimeout(() => {
  video.onended();
}, 4500); // ~4.5 sec (100 frames @ 24fps)
</script>

</body>
</html>
